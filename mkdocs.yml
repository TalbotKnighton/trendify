site_name: trendify
site_url: https://talbotknighton.github.io/trendify/
site_author: Talbot Knighton and David Gable
copyright: Copyright &copy; 2026 Talbot Knighton and David Gable
repo_url: https://github.com/talbotknighton/trendify
repo_name: trendify
remote_branch: gh-pages
remote_name: origin

hooks:
  - docs/hooks.py

watch:
  - docs
  - src
  - scripts

nav:
  - Home: index.md
  - User Guide: user-guide.md
  - Code Reference:
      - reference/trendify/index.md
      - reference/trendify/cli.md
      - reference/trendify/color.md
      - reference/trendify/examples.md
      - reference/trendify/log.md
      - reference/trendify/pipeline.md
      - reference/trendify/typing.md
      - Base:
          - reference/trendify/base/index.md
          - reference/trendify/base/helpers.md
          - reference/trendify/base/pen.md
          - reference/trendify/base/record.md
      - Formats:
          - reference/trendify/formats/index.md
          - reference/trendify/formats/format2d.md
          - reference/trendify/formats/table.md
      - Generator:
          - reference/trendify/generator/index.md
          - reference/trendify/generator/generate.md
          - reference/trendify/generator/histogrammer.md
          - reference/trendify/generator/render.md
          - reference/trendify/generator/table_builder.md
          - reference/trendify/generator/xy_data_plotter.md
      - Plotting:
          - reference/trendify/plotting/index.md
          - reference/trendify/plotting/axline.md
          - reference/trendify/plotting/figure.md
          - reference/trendify/plotting/histogram.md
          - reference/trendify/plotting/point.md
          - reference/trendify/plotting/scatter.md
          - reference/trendify/plotting/trace.md
      - Store:
          - reference/trendify/store/index.md
          - reference/trendify/store/db.md
          - reference/trendify/store/record_store.md
          - reference/trendify/store/tags.md
      - Styling:
          - reference/trendify/styling/index.md
          - reference/trendify/styling/grid.md
          - reference/trendify/styling/legend.md
          - reference/trendify/styling/marker.md
      - Viewer:
          - reference/trendify/viewer/index.md
          - reference/trendify/viewer/app.md
          - reference/trendify/viewer/plot_config.md
          - reference/trendify/viewer/tag_tree.md
          - Routes:
              - reference/trendify/viewer/routes/index.md
              - reference/trendify/viewer/routes/api.md
              - reference/trendify/viewer/routes/pages.md

theme:
  name: material
  logo: assets/main-logo.svg
  favicon: assets/main-logo-white-bg.svg
  font: false

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/lightbulb-on
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.instant
    # - navigation.instant.preview
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.top
    - navigation.path
    - navigation.sections
    - navigation.tabs.sticky
    - navigation.footer
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tooltips
    - search.highlight
    - search.suggest
    - search.share
    - content.tabs.link
    - content.footnote.tooltips

plugins:
  - search
  - open-in-new-tab:
      add_icon: true
  # gen-files and literate-nav are MkDocs-only plugins; zensical ignores them.
  # Reference pages are pre-generated by scripts/gen_ref_pages.py instead.
  # - gen-files:
  #     scripts:
  #       - scripts/gen_ref_pages.py
  # - literate-nav:
  #     nav_file: SUMMARY.md
  # - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            modernize_annotations: true
            backlinks: tree
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_bases: true
            members_order: source
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            separate_signature: true
            summary: false # set to true to get summary tables
            inherited_members: true
            # inheritance_diagram_direction: TD
            # show_inheritance_diagram: true
            show_attribute_values: true
            signature_crossrefs: true
            extensions:
              - pydantic: { schema: true }
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://mkdocstrings.github.io/griffe/objects.inv
            - https://docs.pydantic.dev/latest/objects.inv
            - https://numpy.org/doc/stable/objects.inv

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.blocks.caption
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - zensical.extensions.glightbox:
      auto_themed: true
  - zensical.extensions.macros

extra:
  generator: false

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js
  - https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js

extra_css:
  - css/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css
